# Fuzzel app launcher config
# Reference: man fuzzel

[main]
font=Monaspace Argon:size=13
width=40
lines=10
terminal=ghostty -e
prompt="> "

# Behaviour
icons-enabled=yes
icon-theme=hicolor
fields=name,generic,comment,categories,filename,keywords

# Close on focus loss
exit-on-keyboard-focus-loss=yes

[colors]
# Catppuccin Mocha
background=1e1e2eff
text=cdd6f4ff
match=cba6f7ff            # matched characters (mauve)
selection=313244ff        # selected row background
selection-text=cdd6f4ff
selection-match=cba6f7ff
border=cba6f7ff

[border]
width=2
radius=8
