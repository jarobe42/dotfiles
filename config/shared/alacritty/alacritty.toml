# Alacritty config
# Reference: https://alacritty.org/config-alacritty.html
#
# Note: Alacritty has no native tab support by design.
# Use tmux if you need tabs/splits.
#
# Copy/paste:
#   macOS:  Cmd+C / Cmd+V  (Alacritty defaults)
#   Linux:  Ctrl+Shift+C / Ctrl+Shift+V  (Alacritty defaults)
#   (keyd remaps Super+C → Ctrl+C on Linux which is SIGINT, not copy)

[window]
startup_mode = "Maximized"
decorations = "None"
opacity = 0.95

[window.padding]
x = 12
y = 10

[font]
size = 14.0

[font.normal]
family = "MonaspaceArgon Nerd Font Mono"
style = "Regular"

[font.bold]
family = "MonaspaceArgon Nerd Font Mono"
style = "Bold"

[font.italic]
family = "MonaspaceArgon Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "MonaspaceArgon Nerd Font Mono"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "Never" }

[scrolling]
history = 10000

[bell]
duration = 0

########################################################
# Theme — Catppuccin Mocha
########################################################

[colors.primary]
background = "#1e1e2e"
foreground = "#cdd6f4"

[colors.cursor]
text   = "#1e1e2e"
cursor = "#f5e0dc"

[colors.normal]
black   = "#45475a"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#f5c2e7"
cyan    = "#94e2d5"
white   = "#a6adc8"
