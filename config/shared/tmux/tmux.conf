# tmux config — inspired by nicknisi/dotfiles
# Prefix: C-a (ergonomic with Caps Lock remapped to Ctrl)

########################################################
# Prefix
########################################################

set -g prefix C-a
unbind C-b
bind C-a send-prefix  # pass through to nested tmux
bind a send-prefix    # alternate for nested sessions

########################################################
# General
########################################################

# True colour + undercurl support — inherit from terminal rather than hardcode
set -g default-terminal "${TERM}"
set -ga terminal-overrides ",*:RGB"
set -ga terminal-overrides ",*:Tc"
set -ga terminal-overrides ",*:uund"          # undercurl

# Extended keys: lets TUI apps (nvim etc.) distinguish Shift+Enter, Ctrl+i, etc.
set -g extended-keys always
set -g focus-events on

set -g mouse on
set -g set-clipboard on
set -g history-limit 50000
set -sg escape-time 0   # no delay after Escape (critical for nvim)

########################################################
# Windows & panes
########################################################

set -g base-index 1           # start window numbering at 1
setw -g pane-base-index 1
set -g renumber-windows on    # close gaps when a window is closed
set -g aggressive-resize on   # size window to largest *attached* client

########################################################
# Key bindings
########################################################

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Splits — preserve current working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window — preserve CWD
bind c new-window -c "#{pane_current_path}"

# Pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window navigation (repeatable)
bind -r C-h previous-window
bind -r C-l next-window

# Pane resizing (repeatable, step of 5)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Tile all panes
bind = select-layout tiled

# Toggle status bar
bind T set status

# Synchronize all panes in the current window (useful for broadcasting to multiple agents)
bind y setw synchronize-panes

# Lazygit popup (80% screen, opens at pane CWD)
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E lazygit

########################################################
# Session management
########################################################

# FZF session switcher (replaces default choose-tree) — lists detached sessions
bind s display-popup -E "\
  tmux list-sessions -F '#{?session_attached,,#{session_name}} ' |\
  sed '/^\s*$/d' |\
  fzf --reverse --header 'switch session' |\
  xargs tmux switch-client -t"

# New named session with prompt
bind N command-prompt -p "New session:" "new-session -d -s '%%' \; switch-client -t '%%'"

# Kill current session (with confirmation)
bind X confirm-before -p "Kill session #S? (y/n)" "kill-session"

########################################################
# Agent / activity monitoring
# Windows light up in the status bar when they ring a bell (agent paused/waiting
# for input) or produce output while unfocused. Essential for running multiple
# claude sessions in parallel.
########################################################

setw -g monitor-bell on
setw -g monitor-activity on
set  -g visual-bell off        # no flash — status bar colour is enough
set  -g visual-activity off
set  -g bell-action other      # bell only fires for windows not currently focused
set  -g activity-action other

########################################################
# Copy mode (vi keys)
########################################################

setw -g mode-keys vi

bind Escape copy-mode
bind p paste-buffer

bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

########################################################
# Status bar — nicknisi-style, Catppuccin Mocha
########################################################

# Palette
thm_bg="#1e1e2e"
thm_fg="#cdd6f4"
thm_surface0="#313244"
thm_overlay0="#6c7086"
thm_mauve="#cba6f7"
thm_blue="#89b4fa"
thm_green="#a6e3a1"
thm_red="#f38ba8"
thm_yellow="#f9e2af"

set -g status on
set -g status-position top
set -g status-interval 2
set -g status-style "bg=default,fg=${thm_fg}"   # transparent — inherits terminal bg

# Left: session name pill with powerline right-cap
set -g status-left-length 40
set -g status-left "#[bg=${thm_mauve},fg=${thm_bg},bold] #S #[bg=default,fg=${thm_mauve}]#[default] "

# Right: session count + git branch of active pane
set -g status-right-length 100
set -g status-right "#[fg=${thm_surface0}]#[bg=${thm_surface0},fg=${thm_blue}] #(tmux list-sessions 2>/dev/null | wc -l | tr -d ' ') ses #[fg=${thm_overlay0}]│ #(cd #{pane_current_path} && git branch --show-current 2>/dev/null) #[bg=default,fg=${thm_surface0}]"

# Window list — left-aligned, path basename (or custom name), no numbers
# tmux-agent-indicator: state stored in tmux env TMUX_AGENT_PANE_<id>_STATE by Claude Code hooks.
# claude-indicator.sh reads state per-pane so each window tab reflects its own Claude session.
# ● green = running, ● yellow = needs-input, ○ dim = done, two spaces = no state
set -g status-justify left
setw -g window-status-separator " #[fg=${thm_overlay0}]│ "
setw -g window-status-format         "#(~/.config/tmux/claude-indicator.sh #{pane_id})#[fg=${thm_overlay0}]#{?#{==:#{window_name},zsh},#{b:pane_current_path},#W}"
setw -g window-status-current-format "#(~/.config/tmux/claude-indicator.sh #{pane_id} bold)#[fg=${thm_mauve},bold]#{?#{==:#{window_name},zsh},#{b:pane_current_path},#W}"

# Alert styles — agent paused/waiting (bell) or emitted output while unfocused (activity)
setw -g window-status-bell-style     "fg=${thm_red},bold"
setw -g window-status-activity-style "fg=${thm_yellow}"

# Pane borders
set -g pane-border-style        "fg=${thm_surface0}"
set -g pane-active-border-style "fg=${thm_mauve}"
set -g pane-border-lines simple

# Message / command prompt
set -g message-style "bg=${thm_surface0},fg=${thm_fg}"

########################################################
# TMUX_MINIMAL — hide status bar when there's only one window
# Set TMUX_MINIMAL=1 in the environment to enable. Useful for focused single-task sessions.
########################################################

if-shell "[ -n \"$TMUX_MINIMAL\" ]" {
  set -g status off
  set-hook -g after-new-window      'if "[ #{session_windows} -gt 1 ]" "set status on"'
  set-hook -g after-kill-pane       'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g pane-exited           'if "[ #{session_windows} -lt 2 ]" "set status off"'
  set-hook -g window-layout-changed 'if "[ #{session_windows} -lt 2 ]" "set status off"'
}

########################################################
# tmux-agent-indicator — AI session state in status bar
# State is shown via claude-indicator.sh dots only; disable the plugin's
# window-title background overrides (red/yellow) and border colour changes
# so they don't fight the Catppuccin theme.
########################################################

set -g @agent-indicator-done-window-title-bg ""
set -g @agent-indicator-done-window-title-fg ""
set -g @agent-indicator-needs-input-window-title-bg ""
set -g @agent-indicator-needs-input-window-title-fg ""
set -g @agent-indicator-border-enabled "off"

run-shell "~/.tmux/plugins/tmux-agent-indicator/agent-indicator.tmux"
