# keyd — Mac-like modifier mappings for Linux
#
# Goal: make the physical Cmd key (Super/Meta) behave like macOS Cmd
# for common app shortcuts, so muscle memory transfers between Mac and Linux.
#
# What IS remapped (core mac shortcuts):
#   Super+C → Ctrl+C  (copy — also sends SIGINT in terminals; use Ctrl+Shift+C in Ghostty)
#   Super+V → Ctrl+V  (paste)
#   Super+Z → Ctrl+Z  (undo)
#   Super+Shift+Z → Ctrl+Shift+Z  (redo)
#   Super+X → Ctrl+X  (cut)
#   Super+A → Ctrl+A  (select all)
#   Super+S → Ctrl+S  (save)
#
# What is NOT remapped (reserved for WM / system):
#   Super alone, Super+T/W/F/R/L/N/Q/H/J/K/1-9
#   (Niri window manager, screen lock, app launcher, etc.)
#
# Keyboard layout note:
#   UK Mac variant (Shift+2=@) is set separately via gsettings — see dot-keyboard.
#
# Keychron K15 Pro note:
#   Use Mac mode on both Mac and Linux. On Linux, the physical Cmd key sends
#   leftmeta (Super), which this config intercepts.

[ids]
*

[main]
leftmeta+c = C-c
leftmeta+v = C-v
leftmeta+z = C-z
leftmeta+shift+z = C-S-z
leftmeta+x = C-x
leftmeta+a = C-a
leftmeta+s = C-s

[shift]
# UK Mac xkb layout maps shift+grave to ¬ (not sign).
# Keychron uses US ANSI — no ISO extra key — so restore ~ here.
grave = ~
